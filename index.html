<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macarena Bar - Menú</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
 
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #050505;
        }
 
        /* Fondo con imagen y desenfoque */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            transform: scale(1.1);
        }
 
        /* Contenedor principal */
        .container {
            text-align: center;
            width: 90%;
            max-width: 380px;
        }
 
        /* ── TÍTULO con gradiente cian → morado (igual a la imagen) ── */
        .logo {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
 
            /* Gradiente cian → azul → morado */
            background: linear-gradient(90deg, #00e5ff 0%, #2979ff 50%, #d500f9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
 
            /* Animación de balanceo suave */
            animation: balanceo3D 5s infinite ease-in-out;
        }
 
        @keyframes balanceo3D {
            0%   { transform: rotateY(-8deg) rotateX(3deg); }
            50%  { transform: rotateY(8deg)  rotateX(-3deg); }
            100% { transform: rotateY(-8deg) rotateX(3deg); }
        }
 
        /* Subtítulo "EXCLUSIVE ACCESS" */
        .logo span {
            display: block;
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: #aaaaaa;
            font-weight: 400;
            margin-top: 6px;
            -webkit-text-fill-color: #aaaaaa; /* sobreescribe el gradiente del padre */
            background: none;
            animation: none;
        }
 
        /* Espacio entre título y botones */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 36px;
        }
 
        /* ── BOTONES tipo glassmorphism (igual a la imagen) ── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between; /* emoji/texto a la izquierda, flecha a la derecha */
            text-decoration: none;
            padding: 18px 22px;
            border-radius: 50px;
            padding: 18px 30px;
            font-weight: 600;
            font-size: 1rem;
            color: #ffffff;
            text-transform: none;
 
            /* Fondo semi-transparente oscuro */
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
 
            /* Borde sutil */
            border: 1px solid rgba(255, 255, 255, 0.15);
 
            transition: all 0.25s ease;
        }
 
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }
 
        /* Flecha → a la derecha */
        .btn::after {
            content: '→';
            font-size: 1.1rem;
            opacity: 0.7;
        }
 
    </style>
</head>
<body>
 
    <div class="background"></div>
 
    <div class="container">
 
        <h1 class="logo">
            MACARENA
            <span>bar</span>
        </h1>
 
        <div class="menu-list">
            <a href="https://kenimarquines-cyber.github.io/PLAN/"                    class="btn">✨ Perfil</a>
            <a href="https://kenimarquines-cyber.github.io/CHAT/"                    class="btn">💬 Chat</a>
            <a href="https://duberandresurbano-tech.github.io/Proyecto-html/"        class="btn">📅 Hacer Reserva</a>
            <a href="https://kenimarquines-cyber.github.io/CATALOGO/"               class="btn">🏠 Catálogo</a>
            <a href="https://duberandresurbano-tech.github.io/inicio-de-sesion/"    class="btn">🚪 Cerrar Sesión</a>
        </div>
 
    </div>
 
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/INICIO/sw.js");
            });
        }
    </script>
</body>
</html>
